name: Tests

on:
  push:
    branches: ['master']
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ['master']
  workflow_dispatch:
    inputs:
      browser_smoke:
        description: 'Run GoScript browser package-test smokes'
        required: false
        type: boolean
        default: false

# Builds images for target boards.
permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.26.5']
        bun: ['latest']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}

      - name: Setup Bun ${{ matrix.bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Bun install
        run: bun install

      - name: Test Go
        run: go test -timeout=10m -v ./...

      - name: Typecheck Js
        run: bun typecheck

      - name: Test Js
        run: bun run test:js

      - name: Lint Js
        run: bun lint:js

  browser-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.browser_smoke }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run GoScript browser package smoke
        run: bun run test:go:browser

      - name: Run GoScript go_js_wasm_exec shim smoke
        run: bun run test:go:browser:shim
