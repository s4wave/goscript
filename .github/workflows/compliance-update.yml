name: Compliance Update

on:
  push:
    branches: ['master']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compliance-update:
    name: Update Compliance Files
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: compliance-update
    steps:
      - name: Create spacewave-ci app token
        id: spacewave_ci_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SPACEWAVE_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.SPACEWAVE_CI_APP_PRIVATE_KEY }}
          owner: s4wave
          repositories: goscript
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.spacewave_ci_app_token.outputs.token }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.5'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Run compliance suite
        run: go test -timeout=10m -v ./compiler -run '^TestCompliance$'

      - name: Commit, verify determinism, push
        run: |
          if [[ -z "$(git status --porcelain=v1 -- tests/)" ]]; then
            echo "tests/ is clean; nothing to commit."
            exit 0
          fi

          git config user.name "spacewave-ci[bot]"
          git config user.email "277994435+spacewave-ci[bot]@users.noreply.github.com"
          git add tests/
          git commit -s -m "chore(compliance): update generated test data"

          go test -timeout=10m -v ./compiler -run '^TestCompliance$'
          if [[ -n "$(git status --porcelain=v1 -- tests/)" ]]; then
            echo "Non-deterministic compliance generation: tests/ is dirty after a second compliance run."
            git status --porcelain=v1 -- tests/
            git --no-pager diff -- tests/
            exit 1
          fi

          git push origin HEAD:master
